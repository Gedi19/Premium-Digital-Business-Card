  <script>
    (function() {
      'use strict';
      var currentPageUrl = window.location.href;
      var img = document.getElementById('brandLogo');
      if (img) img.onerror = function() { img.style.display = 'none'; var f = document.getElementById('brandLogoFallback'); if (f) f.style.display = 'flex'; };

      // REAL QR using qrcodejs - cyan for display
      function generateRealQRCode() {
        var c = document.getElementById('qrCodeContainer'); if (!c) return; c.innerHTML = '';
        if (typeof QRCode !== 'undefined') { new QRCode(c, { text: currentPageUrl, width: 64, height: 64, colorDark: '#009FE3', colorLight: '#FFFFFF', correctLevel: QRCode.CorrectLevel.H }); }
        else { c.innerHTML = '<div style="width:64px;height:64px;display:flex;align-items:center;justify-content:center;background:#009FE3;color:white;border-radius:0.5rem;font-size:7px;text-align:center;padding:4px;font-weight:bold;">TAP</div>'; }
      }

      // Generate large QR - cyan for preview, black for download
      function generateLargeQR(color, callback) {
        var tempDiv = document.createElement('div');
        tempDiv.style.position = 'absolute'; tempDiv.style.left = '-9999px'; tempDiv.style.top = '-9999px';
        document.body.appendChild(tempDiv);
        if (typeof QRCode !== 'undefined') {
          new QRCode(tempDiv, { text: currentPageUrl, width: 256, height: 256, colorDark: color, colorLight: '#FFFFFF', correctLevel: QRCode.CorrectLevel.H });
          setTimeout(function() { var canvas = tempDiv.querySelector('canvas'); if (canvas && callback) callback(canvas); document.body.removeChild(tempDiv); }, 400);
        } else { document.body.removeChild(tempDiv); if (callback) callback(null); }
      }

      window.confirmDownloadQR = function() {
        var existing = document.querySelector('.confirm-overlay'); if (existing) existing.remove();
        var overlay = document.createElement('div'); overlay.className = 'confirm-overlay';
        overlay.onclick = function(e) { if (e.target === overlay) overlay.remove(); };
        var dialog = document.createElement('div'); dialog.className = 'confirm-dialog';
        dialog.innerHTML = 
          '<h3 style="font-size:1.2rem;font-weight:700;color:#1F2937;margin-bottom:0.2rem;">QR Code</h3>' +
          '<p style="font-size:0.8rem;color:#6B7280;margin-bottom:0.5rem;">High Quality · Scannable</p>' +
          '<div class="qr-preview-large"><canvas id="previewCanvas" width="180" height="180" style="border-radius:0.5rem;"></canvas></div>' +
          '<div class="btn-row">' +
            '<button class="confirm-btn" style="background:#009FE3;color:white;" id="confirmDownload"><i class="fa-solid fa-download"></i> Download</button>' +
            '<button class="confirm-btn" style="background:#1F2937;color:white;" id="confirmShare"><i class="fa-solid fa-share-nodes"></i> Share</button>' +
          '</div>' +
          '<button class="confirm-btn" style="background:#F3F4F6;color:#4B5563;" id="confirmCancel">Cancel</button>';
        overlay.appendChild(dialog); document.body.appendChild(overlay);
        
        // Preview with cyan
        generateLargeQR('#009FE3', function(largeCanvas) {
          var previewCanvas = document.getElementById('previewCanvas');
          if (previewCanvas && largeCanvas) { var ctx = previewCanvas.getContext('2d'); ctx.fillStyle = '#FFFFFF'; ctx.fillRect(0, 0, 180, 180); ctx.drawImage(largeCanvas, 0, 0, 180, 180); }
        });
        document.getElementById('confirmDownload').onclick = function() { overlay.remove(); downloadQRPNG(); };
        document.getElementById('confirmShare').onclick = function() { overlay.remove(); shareQRCode(); };
        document.getElementById('confirmCancel').onclick = function() { overlay.remove(); };
      };

      function downloadQRPNG() {
        generateLargeQR('#000000', function(blackCanvas) {
          if (!blackCanvas) { showToast('Generating... tap again', 'info'); return; }
          var link = document.createElement('a'); link.download = 'Bogale_Siyum_QR.png'; link.href = blackCanvas.toDataURL('image/png'); link.click();
          showToast('QR code downloaded!', 'success');
        });
      }

      function shareQRCode() {
        generateLargeQR('#000000', function(blackCanvas) {
          if (!blackCanvas) { showToast('Generating... tap again', 'info'); return; }
          blackCanvas.toBlob(function(blob) {
            var file = new File([blob], 'Bogale_Siyum_QR.png', { type: 'image/png' });
            var shareData = { title: 'Bogale Siyum - QR Code', text: 'Scan to connect with Bogale Siyum', files: [file] };
            if (navigator.share && navigator.canShare && navigator.canShare(shareData)) { navigator.share(shareData).then(function() { showToast('Shared!', 'success'); }).catch(function() { window.copyText(currentPageUrl); }); }
            else { window.copyText(currentPageUrl); showToast('Link copied!', 'info'); }
          }, 'image/png');
        });
      }

      function showToast(m, t) { t = t || 'success'; var c = document.getElementById('toastContainer'), o = document.createElement('div'); o.className = 'toast'; var i = { success: 'fa-circle-check text-emerald-400', error: 'fa-circle-exclamation text-red-400', info: 'fa-circle-info text-blue-400' }; o.innerHTML = '<i class="fa-solid ' + (i[t] || i.success) + '"></i> ' + m; c.appendChild(o); setTimeout(function() { o.style.opacity = '0'; o.style.transition = 'opacity 0.2s ease'; setTimeout(function() { o.remove(); }, 250); }, 2400); }
