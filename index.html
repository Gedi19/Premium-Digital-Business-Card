  <style>
    :root {
      --brand-cyan: #009FE3;
      --brand-blue: #0077B5;
      --accent-orange: #F7931E;
      --white: #FFFFFF;
      --charcoal: #1F2937;
      --light-gray: #F8FAFD;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: linear-gradient(160deg, #33b5e8 0%, #009FE3 25%, #00a8ee 40%, #0090d6 60%, #0082c4 80%, #0077B5 100%);
      background-attachment: fixed;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: clamp(1rem, 4vw, 1.8rem);
      position: relative;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* Ambient background glow */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: 
        radial-gradient(ellipse at 50% 30%, rgba(255, 255, 255, 0.35) 0%, transparent 50%),
        radial-gradient(ellipse at 20% 75%, rgba(0, 159, 227, 0.3) 0%, transparent 45%),
        radial-gradient(ellipse at 80% 20%, rgba(255, 255, 255, 0.25) 0%, transparent 40%),
        radial-gradient(ellipse at 50% 50%, rgba(0, 168, 238, 0.25) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    /* Floating particles */
    .particle {
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      z-index: 0;
      animation: floatParticle 15s infinite ease-in-out;
    }
    .particle:nth-child(1) { width: 120px; height: 120px; top: 5%; left: 3%; background: rgba(255, 255, 255, 0.5); }
    .particle:nth-child(2) { width: 70px; height: 70px; top: 15%; right: 5%; background: rgba(255, 255, 255, 0.4); animation-duration: 19s; animation-delay: -5s; }
    .particle:nth-child(3) { width: 55px; height: 55px; bottom: 18%; left: 6%; background: rgba(51, 181, 232, 0.45); animation-duration: 17s; animation-delay: -9s; }
    .particle:nth-child(4) { width: 80px; height: 80px; top: 50%; right: 8%; background: rgba(255, 255, 255, 0.38); animation-duration: 21s; animation-delay: -3s; }
    .particle:nth-child(5) { width: 45px; height: 45px; bottom: 30%; left: 15%; background: rgba(0, 168, 238, 0.5); animation-duration: 23s; animation-delay: -7s; }

    @keyframes floatParticle {
      0%, 100% { transform: translateY(0px) translateX(0px) scale(1); opacity: 0.4; }
      25% { transform: translateY(-35px) translateX(20px) scale(1.1); opacity: 0.75; }
      50% { transform: translateY(-15px) translateX(-22px) scale(0.9); opacity: 0.5; }
      75% { transform: translateY(-40px) translateX(10px) scale(1.05); opacity: 0.65; }
    }

    /* Card entrance animation */
    .card-enter {
      animation: cardRise 0.7s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      opacity: 0;
      transform: translateY(28px) scale(0.97);
    }
    @keyframes cardRise {
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* Premium card */
    .premium-card {
      background: #FFFFFF;
      box-shadow: 
        0 30px 60px rgba(0, 0, 0, 0.15),
        0 12px 24px rgba(0, 0, 0, 0.08),
        0 0 0 1px rgba(255, 255, 255, 0.1) inset;
    }

    /* Logo - borderless floating white mark */
    .logo-float {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 150px;
      margin-bottom: 0.75rem;
    }
    .logo-float img {
      width: 100%;
      height: auto;
      object-fit: contain;
      filter: brightness(0) saturate(100%) invert(100%) sepia(0%) saturate(0%) hue-rotate(0deg) brightness(200%) contrast(100%);
      transition: filter 0.35s ease, transform 0.35s ease;
    }
    .logo-float img:hover {
      filter: brightness(0) saturate(100%) invert(100%) sepia(0%) saturate(0%) hue-rotate(0deg) brightness(220%) contrast(100%) drop-shadow(0 6px 14px rgba(255, 255, 255, 0.45));
      transform: scale(1.03);
    }

    /* Header with wave */
    .header-with-wave {
      position: relative;
      padding: 1.5rem 1.5rem 4rem 1.5rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      overflow: visible;
      background: linear-gradient(180deg, #009FE3 0%, #0088CC 40%, #0077B5 100%);
    }

    /* Wave container */
    .wave-container {
      position: absolute;
      bottom: -2px;
      left: 0;
      width: 100%;
      line-height: 0;
      z-index: 15;
      pointer-events: none;
    }
    .wave-container svg {
      width: 100%;
      height: auto;
      display: block;
    }

    /* Floating action toolbar */
    .floating-toolbar {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 0.5rem;
      padding: 0 1.25rem;
      margin-top: -2.6rem;
      position: relative;
      z-index: 30;
      width: 100%;
    }

    /* Action pill buttons */
    .action-pill {
      width: 2.6rem;
      height: 2.6rem;
      min-width: 2.6rem;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255, 255, 255, 0.94);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.7);
      box-shadow: 
        0 8px 22px rgba(0, 100, 150, 0.1),
        0 2px 6px rgba(0, 0, 0, 0.04),
        inset 0 1px 0 rgba(255, 255, 255, 0.9);
      color: #009FE3;
      font-size: 0.9rem;
      transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1.15);
      cursor: pointer;
      flex-shrink: 0;
      overflow: hidden;
    }
    .action-pill::after {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 30% 30%, rgba(0, 159, 227, 0.1) 0%, transparent 70%);
      opacity: 0;
      transition: opacity 0.3s;
    }
    .action-pill:hover {
      transform: translateY(-4px);
      background: #ffffff;
      box-shadow: 
        0 16px 32px rgba(0, 130, 210, 0.22),
        0 4px 10px rgba(0, 0, 0, 0.06);
      color: #00608a;
    }
    .action-pill:hover::after { opacity: 1; }
    .action-pill:active { transform: scale(0.9); }

    /* Section divider */
    .section-divider {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0 1.25rem;
    }
    .section-divider::before,
    .section-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(0, 159, 227, 0.15), transparent);

      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: #009FE3;
      opacity: 0.4;
      flex-shrink: 0;

    /* Glass panel */
    .glass-panel {
      background: rgba(255, 255, 255, 0.82);

      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.6);

    .status-dot {

    /* Verified badge */
    .verified-badge {

      height: 26px;
      display: flex;

      position: absolute;
      top: -3px;
      right: -3px;
      border: 3px solid white;
    }

    /* Contact cards */
    .contact-card {
      background: #FFFFFF;
      border-left: 4px solid #009FE3;
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.02);
      transition: all 0.32s cubic-bezier(0.25, 0.8, 0.25, 1);
    }
    .contact-card:hover {
      background: #FAFDFF;
      border-left-color: #F7931E;
      box-shadow: 0 5px 14px rgba(0, 80, 130, 0.05), 0 2px 6px rgba(0, 0, 0, 0.03);
      transform: translateX(4px) translateY(-1px);
    }
    .contact-card-clickable { cursor: pointer; }

    /* Icon circle */
    .icon-circle {
      background: #E8F4FD;
      color: #009FE3;
      box-shadow: 0 2px 6px rgba(0, 140, 200, 0.1);
    }

    /* Toast notifications */
    .toast-container {
      position: fixed;
      top: 1.2rem;
      right: 1.2rem;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
      pointer-events: none;
    }
    .toast {
      background: rgba(31, 41, 55, 0.93);
      backdrop-filter: blur(18px);
      color: white;
      padding: 0.7rem 1.2rem;
      border-radius: 1rem;
      box-shadow: 0 18px 36px rgba(0, 0, 0, 0.2);
      font-weight: 500;
      font-size: 0.85rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      animation: slideToast 0.35s cubic-bezier(0.16, 1, 0.3, 1);
      border: 1px solid rgba(255, 255, 255, 0.1);
      pointer-events: auto;
    }
    @keyframes slideToast {
      from { transform: translateX(110%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }

    /* QR section */
    .qr-clickable {
      cursor: pointer;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }
    .qr-clickable:hover { transform: scale(1.05); box-shadow: 0 8px 20px rgba(0, 130, 200, 0.12); }
    .qr-clickable:active { transform: scale(0.95); }

    #qrCodeContainer {
      border-radius: 0.9rem;
      background: white;
      padding: 6px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.03);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #qrCodeContainer img,
    #qrCodeContainer canvas {
      display: block;
      border-radius: 0.5rem;
    }

    /* Dark mode */
    @media (prefers-color-scheme: dark) {
      body {
        background: linear-gradient(160deg, #0077B5 0%, #006694 50%, #005580 100%);
        background-attachment: fixed;
      }
      .premium-card { background: #FFFFFF; }
      .contact-card { background: #FFFFFF; }
      .action-pill { background: rgba(255, 255, 255, 0.9); color: #009FE3; }
      .glass-panel { background: rgba(255, 255, 255, 0.82); }
    }

    /* Reduced motion */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>

  <script>
    (function() {
      'use strict';

      var currentPageUrl = window.location.href;

      // Generate real QR code
      function generateRealQRCode() {
        var container = document.getElementById('qrCodeContainer');
        if (!container) return;
        container.innerHTML = '';
        
        if (typeof QRCode !== 'undefined') {
          try {
            new QRCode(container, {
              text: currentPageUrl,
              width: 72,
              height: 72,
              colorDark: '#009FE3',
              colorLight: '#FFFFFF',
              correctLevel: QRCode.CorrectLevel.M
            });
          } catch (error) {
            showFallbackQR();
          }
        } else {
          setTimeout(function() {
            if (typeof QRCode !== 'undefined') {
              generateRealQRCode();
            } else {
              showFallbackQR();
            }
          }, 500);
        }
      }

      // Fallback QR display
      function showFallbackQR() {
        var container = document.getElementById('qrCodeContainer');
        if (!container) return;
        container.innerHTML = '<div style="width:72px;height:72px;display:flex;align-items:center;justify-content:center;background:#009FE3;color:white;border-radius:0.5rem;font-size:8px;text-align:center;padding:4px;">TAP TO<br>OPEN<br>LINK</div>';
      }

      // Open current URL
      window.openCurrentUrl = function() {
        window.open(currentPageUrl, '_blank', 'noopener,noreferrer');
        showToast('Opening profile link...', 'info');
      };

      // Toast notification
      function showToast(message, type) {
        type = type || 'success';
        var container = document.getElementById('toastContainer');
        var toast = document.createElement('div');
        toast.className = 'toast';
        
        var icons = {
          success: 'fa-circle-check text-emerald-400',
          error: 'fa-circle-exclamation text-red-400',
          info: 'fa-circle-info text-blue-400'
        };
        
        toast.innerHTML = '<i class="fa-solid ' + (icons[type] || icons.success) + '"></i> ' + message;
        container.appendChild(toast);
        
        setTimeout(function() {
          toast.style.opacity = '0';
          toast.style.transition = 'opacity 0.2s ease';
          setTimeout(function() { toast.remove(); }, 250);
        }, 2400);
      }

      // Copy text to clipboard
      window.copyText = function(text) {
        if (!navigator.clipboard) {
          var textarea = document.createElement('textarea');
          textarea.value = text;
          textarea.style.position = 'fixed';
          textarea.style.opacity = '0';
          document.body.appendChild(textarea);
          textarea.select();
          document.execCommand('copy');
          document.body.removeChild(textarea);
          showToast('Copied to clipboard', 'success');
          return;
        }
        navigator.clipboard.writeText(text).then(function() {
          showToast('Copied successfully', 'success');
        }).catch(function() {
          showToast('Unable to copy', 'error');
        });
      };

      // Share profile
      window.shareProfile = function() {
        var shareData = {
          title: 'Bogale Siyum - Director Hawassa District',
          text: 'Director Hawassa District · Cooperative Bank of Oromia',
          url: currentPageUrl
        };
        
        if (navigator.share && navigator.canShare && navigator.canShare(shareData)) {
          navigator.share(shareData).then(function() {
            showToast('Shared successfully', 'success');
          }).catch(function(error) {
            if (error.name !== 'AbortError') {
              window.copyText(currentPageUrl);
              showToast('Link copied to clipboard', 'info');
            }
          });
        } else {
          window.copyText(currentPageUrl);
          showToast('Profile link copied to clipboard', 'info');
        }
      };

      // Download vCard
      window.downloadVCard = function() {
        var vCard = 'BEGIN:VCARD\r\n' +
          'VERSION:3.0\r\n' +
          'FN:Bogale Siyum\r\n' +
          'N:Siyum;Bogale;;;\r\n' +
          'ORG:Cooperative Bank of Oromia\r\n' +
          'TITLE:Director Hawassa District\r\n' +
          'ROLE:Director\r\n' +
          'TEL;TYPE=WORK,VOICE:+251913329703\r\n' +
          'EMAIL;TYPE=INTERNET:Bogsiyum@gmail.com\r\n' +
          'URL:' + currentPageUrl + '\r\n' +
          'ADR;TYPE=WORK:;;Hawassa District Headquarters;Hawassa;;;Ethiopia\r\n' +
          'X-SOCIALPROFILE;TYPE=LinkedIn:https://www.linkedin.com/in/bogale-siyum-6b6079302\r\n' +
          'X-SOCIALPROFILE;TYPE=Telegram:https://t.me/Gifti2026\r\n' +
          'X-SOCIALPROFILE;TYPE=WhatsApp:https://wa.me/251913329703\r\n' +
          'NOTE:Digital Identity - Cooperative Bank of Oromia\r\n' +
          'END:VCARD';
        
        var blob = new Blob([vCard], { type: 'text/vcard;charset=utf-8;' });
        var url = URL.createObjectURL(blob);
        var link = document.createElement('a');
        link.href = url;
        link.download = 'Bogale_Siyum_CoopBank.vcf';
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        URL.revokeObjectURL(url);
        showToast('Contact Saved Successfully', 'success');
      };

      // Initialize
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', function() {
          setTimeout(generateRealQRCode, 300);
        });
      } else {
        setTimeout(generateRealQRCode, 100);
      }
    })();
  </script>
</body>
</html>
