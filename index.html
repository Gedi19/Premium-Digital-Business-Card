      --charcoal: #1F2937;

      --shadow-md: 0 5px 14px rgba(0,80,130,0.05), 0 2px 6px rgba(0,0,0,0.03);
      --shadow-lg: 0 10px 24px rgba(0,80,130,0.07), 0 4px 10px rgba(0,0,0,0.04);
      --shadow-xl: 0 18px 40px rgba(0,80,130,0.1), 0 8px 20px rgba(0,0,0,0.05);

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: linear-gradient(160deg, #33b5e8 0%, #009FE3 25%, #00a8ee 40%, #0090d6 60%, #0082c4 80%, #0077B5 100%);

      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: clamp(1rem, 4vw, 1.8rem);
      position: relative;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: 
        radial-gradient(ellipse at 50% 30%, rgba(255, 255, 255, 0.35) 0%, transparent 50%),
        radial-gradient(ellipse at 20% 75%, rgba(0, 159, 227, 0.3) 0%, transparent 45%),
        radial-gradient(ellipse at 80% 20%, rgba(255, 255, 255, 0.25) 0%, transparent 40%),
        radial-gradient(ellipse at 50% 50%, rgba(0, 168, 238, 0.25) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    .particle {
      position: fixed;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.4);
      pointer-events: none;
      z-index: 0;
      animation: floatParticle 15s infinite ease-in-out;
    }
    .particle:nth-child(1) { width: 120px; height: 120px; top: 5%; left: 3%; background: rgba(255, 255, 255, 0.5); }
    .particle:nth-child(2) { animation-duration: 19s; animation-delay: -5s; width: 70px; height: 70px; top: 15%; right: 5%; background: rgba(255, 255, 255, 0.4); }
    .particle:nth-child(3) { animation-duration: 17s; animation-delay: -9s; width: 55px; height: 55px; bottom: 18%; left: 6%; background: rgba(51, 181, 232, 0.45); }
    .particle:nth-child(4) { animation-duration: 21s; animation-delay: -3s; width: 80px; height: 80px; top: 50%; right: 8%; background: rgba(255, 255, 255, 0.38); }
    .particle:nth-child(5) { animation-duration: 23s; animation-delay: -7s; width: 45px; height: 45px; bottom: 30%; left: 15%; background: rgba(0, 168, 238, 0.5); }

    @keyframes floatParticle {
      0%, 100% { transform: translateY(0px) translateX(0px) scale(1); opacity: 0.4; }
      25% { transform: translateY(-35px) translateX(20px) scale(1.1); opacity: 0.75; }
      50% { transform: translateY(-15px) translateX(-22px) scale(0.9); opacity: 0.5; }
      75% { transform: translateY(-40px) translateX(10px) scale(1.05); opacity: 0.65; }
    }

    .card-enter {
      animation: cardRise 0.7s cubic-bezier(0.16, 1, 0.3, 1) forwards;

      transform: translateY(28px) scale(0.97);
    }
    @keyframes cardRise {
      to { opacity: 1; transform: translateY(0) scale(1); }

      padding: 0 1.25rem;

      position: relative;
      z-index: 30;

    .action-pill {

      height: 2.6rem;

      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;

      -webkit-backdrop-filter: blur(16px);

      overflow: hidden;
      cursor: pointer;
      flex-shrink: 0;

    .action-pill::after {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 30% 30%, rgba(0,159,227,0.1) 0%, transparent 70%);

      transition: opacity 0.3s;

    .icon-circle {

    .toast-container {

      right: 1.2rem;

      display: flex;
      flex-direction: column;
      gap: 0.6rem;
      pointer-events: none;

    .toast {
      background: rgba(31, 41, 55, 0.93);
      backdrop-filter: blur(18px);
      color: white;
      padding: 0.7rem 1.2rem;
      border-radius: 1rem;
      box-shadow: 0 18px 36px rgba(0,0,0,0.2);
      font-weight: 500;
      font-size: 0.85rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      animation: slideToast 0.35s cubic-bezier(0.16, 1, 0.3, 1);
      border: 1px solid rgba(255,255,255,0.1);
      pointer-events: auto;
    }
    @keyframes slideToast {
      from { transform: translateX(110%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }

    .qr-clickable {
      cursor: pointer;

    .qr-clickable:hover { transform: scale(1.05); box-shadow: 0 8px 20px rgba(0, 130, 200, 0.12); }
    .qr-clickable:active { transform: scale(0.95); }

    #qrCodeContainer {
      border-radius: 0.9rem;
      background: white;
      padding: 6px;

    @media (prefers-color-scheme: dark) {

      .glass-panel { background: rgba(255,255,255,0.82); }
    }
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
    }
  </style>

  <script>
    (function() {
      'use strict';
      const currentPageUrl = window.location.href;
      function generateRealQRCode() {
        const container = document.getElementById('qrCodeContainer');
        if (!container) return;
        container.innerHTML = '';
        if (typeof QRCode !== 'undefined') {
          try { new QRCode(container, { text: currentPageUrl, width: 72, height: 72, colorDark: '#009FE3', colorLight: '#FFFFFF', correctLevel: QRCode.CorrectLevel.M }); } catch (error) { showFallbackQR(); }
        } else { setTimeout(() => { if (typeof QRCode !== 'undefined') generateRealQRCode(); else showFallbackQR(); }, 500); }
      }
      function showFallbackQR() { const container = document.getElementById('qrCodeContainer'); if (!container) return; container.innerHTML = '<div style="width:72px;height:72px;display:flex;align-items:center;justify-content:center;background:#009FE3;color:white;border-radius:0.5rem;font-size:8px;text-align:center;padding:4px;">TAP TO<br>OPEN<br>LINK</div>'; }
      window.openCurrentUrl = function() { window.open(currentPageUrl, '_blank'); showToast('Opening profile link...', 'info'); };
      function showToast(message, type = 'success') {
        const container = document.getElementById('toastContainer');
        const toast = document.createElement('div'); toast.className = 'toast';
        const iconMap = { success: 'fa-circle-check text-emerald-400', error: 'fa-circle-exclamation text-red-400', info: 'fa-circle-info text-blue-400' };
        toast.innerHTML = `<i class="fa-solid ${iconMap[type] || iconMap.success}"></i> ${message}`;
        container.appendChild(toast);
